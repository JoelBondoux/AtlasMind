name: Clean dev memory on master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  clean-memory:
    name: Remove development memory artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove development artifacts
        run: |
          # Remove CLAUDE.md (dev instructions, not needed by end users)
          rm -f CLAUDE.md

          # Remove all content inside project_memory but preserve the folder
          # structure with .gitkeep files so the SSOT layout survives for end users.
          find project_memory -type f ! -name '.gitkeep' -delete
          find project_memory -mindepth 1 -type d | while read dir; do
            if [ -z "$(ls -A "$dir")" ]; then
              touch "$dir/.gitkeep"
            fi
          done

      - name: Commit cleaned state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md project_memory/
          if git diff --cached --quiet; then
            echo "Nothing to clean — skipping commit."
          else
            git commit -m "chore: remove dev memory artifacts from master [skip ci]"
            git push origin master
          fi
