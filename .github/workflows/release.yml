name: Release — promote develop to master

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — validate and create PR but skip auto-merge enablement"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Open release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release secrets
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::Missing RELEASE_TOKEN secret."
            exit 1
          fi

          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "::error::Missing VSCE_PAT secret."
            exit 1
          fi

      - name: Create or find release PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          EXISTING=$(gh pr list --base master --head develop --state open \
            --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Reusing existing PR #${EXISTING}"
            PR_NUMBER="$EXISTING"
          else
            BODY="Automated release promotion for v${VERSION}. See CHANGELOG.md for full release notes."
            PR_URL=$(gh pr create \
              --base master \
              --head develop \
              --title "chore: promote develop to master for ${VERSION}" \
              --body "$BODY")
            PR_NUMBER="${PR_URL##*/}"
            echo "Created PR #${PR_NUMBER}"
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Enable release PR auto-merge
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh pr merge ${{ steps.pr.outputs.number }} \
            --auto \
            --squash

      - name: Write job summary
        if: always()
        run: |
          VERSION=${{ steps.pr.outputs.version }}
          PR=${{ steps.pr.outputs.number }}
          DRY="${{ inputs.dry_run }}"

          {
            echo "## Release summary"
            echo ""
            echo "| Field   | Value |"
            echo "|---------|-------|"
            echo "| Version | \`${VERSION}\` |"
            echo "| PR      | [#${PR}](https://github.com/${{ github.repository }}/pull/${PR}) |"
            if [ "$DRY" = "true" ]; then
              echo "| Mode    | Dry run — auto-merge not enabled |"
            else
              echo "| Mode    | Auto-merge enabled; publish will run after master is tagged |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
