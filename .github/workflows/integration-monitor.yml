name: External Integration Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Generate integration drift report
        id: report
        run: node .github/scripts/check-integration-drift.mjs --report-file .artifacts/integration-drift.md --json-file .artifacts/integration-drift.json

      - name: Upload integration drift artifact
        uses: actions/upload-artifact@v7
        with:
          name: integration-drift-report
          path: .artifacts/
          if-no-files-found: error

      - name: Open or update integration drift issue
        if: steps.report.outputs.has_drift == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const title = 'chore: review external integration drift';
            const body = fs.readFileSync('.artifacts/integration-drift.md', 'utf8');
            const { owner, repo } = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.info(`Created issue #${created.data.number}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}