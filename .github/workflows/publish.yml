name: Release — publish Marketplace from tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish Marketplace release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve target ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        env:
          TAG_NAME: ${{ steps.ref.outputs.tag }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${VERSION}"
          if [ "${TAG_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Tag ${TAG_NAME} does not match package version ${VERSION}."
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish:release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ steps.ref.outputs.tag }}
        run: |
          gh release view "${TAG_NAME}" >/dev/null 2>&1 && exit 0
          gh release create "${TAG_NAME}" --generate-notes --title "${TAG_NAME}"
