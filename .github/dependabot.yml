version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
      - area:ci
    groups:
      runtime-integrations:
        patterns:
          - "@modelcontextprotocol/sdk"
          - "zod"
          - "@types/vscode"
      developer-tooling:
        dependency-type: development
    commit-message:
      prefix: "security"
      include: scope
    # Enable security updates
    reviewers:
      - "JoelBondoux"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
      - area:ci
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "security"
      include: scope